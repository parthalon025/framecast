name: Build Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual build"
        required: false

permissions:
  contents: write
  id-token: write  # Required for cosign keyless signing

jobs:
  # Run full test suite before building image
  test:
    name: Test Gate
    uses: ./.github/workflows/test.yml

  build:
    name: Build Pi Image
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Pre-build frontend (host-native)
        working-directory: app/frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend output
        run: |
          test -f app/static/js/app.js || { echo "::error::Frontend build failed"; exit 1; }

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted qemu-user-static \
            debootstrap zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc gpg pigz xxd arch-test \
            binfmt-support qemu-utils kpartx fdisk

      - name: Cache pi-gen base rootfs
        id: cache-rootfs
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: pi-gen/pi-gen/work
          key: pigen-rootfs-${{ hashFiles('pi-gen/config', 'pi-gen/build.sh', 'pi-gen/stage2-framecast/00-packages/00-packages') }}

      - name: Build pi-gen image
        run: |
          if [ "${{ steps.cache-rootfs.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — rebuilding app stage only (~5 min)"
            cd pi-gen && sudo bash build.sh --continue
          else
            echo "No cache — full build (~35 min)"
            cd pi-gen && sudo bash build.sh
          fi
        env:
          GITHUB_OWNER: parthalon025
          GITHUB_REPO: framecast

      - name: Upload image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: framecast-image
          path: pi-gen/pi-gen/deploy/*.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload build info
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: framecast-build-info
          path: pi-gen/pi-gen/deploy/*.info
          retention-days: 30

  # Validate image structure by mounting and inspecting partitions.
  # Pi kernels lack virtio drivers so QEMU -M virt can't boot them.
  # Structural validation is faster and more deterministic.
  image-validation:
    name: Image Validation
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: framecast-image

      - name: Extract image
        run: |
          unzip ./*.zip
          IMG=$(ls ./*.img)
          echo "Image: $IMG ($(du -h "$IMG" | cut -f1))"
          echo "IMG_FILE=$IMG" >> "$GITHUB_ENV"

      - name: Validate boot partition
        run: |
          LOOP=$(sudo losetup --find --show --partscan "$IMG_FILE")
          sudo mkdir -p /mnt/boot
          sudo mount "${LOOP}p1" /mnt/boot

          FAIL=0
          for f in kernel8.img cmdline.txt config.txt; do
            if [ -f "/mnt/boot/$f" ]; then
              echo "  OK  boot/$f ($(du -h "/mnt/boot/$f" | cut -f1))"
            else
              echo "  FAIL  boot/$f missing"
              FAIL=1
            fi
          done

          sudo umount /mnt/boot
          echo "LOOP=$LOOP" >> "$GITHUB_ENV"
          if [ "$FAIL" -eq 1 ]; then
            sudo losetup -d "$LOOP"
            echo "::error::Boot partition validation failed"
            exit 1
          fi

      - name: Validate root filesystem
        run: |
          sudo mkdir -p /mnt/root
          sudo mount "${LOOP}p2" /mnt/root

          FAIL=0

          echo "=== FrameCast app ==="
          for f in \
            /opt/framecast/app/web_upload.py \
            /opt/framecast/app/api.py \
            /opt/framecast/app/sse.py \
            /opt/framecast/app/gunicorn.conf.py \
            /opt/framecast/app/modules/db.py \
            /opt/framecast/app/modules/wifi.py \
            /opt/framecast/app/modules/auth.py \
            /opt/framecast/app/modules/updater.py \
            /opt/framecast/app/static/js/app.js \
            /opt/framecast/app/static/css/superhot.css \
            /opt/framecast/kiosk/kiosk.sh \
            /opt/framecast/kiosk/browser.js \
            /opt/framecast/scripts/health-check.sh \
            /opt/framecast/scripts/hdmi-control.sh \
            /opt/framecast/requirements.txt; do
            if [ -f "/mnt/root$f" ]; then
              echo "  OK  $f"
            else
              echo "  FAIL  $f missing"
              FAIL=1
            fi
          done

          echo "=== systemd units ==="
          for svc in \
            framecast.service \
            framecast-kiosk.service \
            framecast-update.timer \
            framecast-health.timer \
            framecast-schedule.timer; do
            if [ -f "/mnt/root/etc/systemd/system/$svc" ] || \
               [ -L "/mnt/root/etc/systemd/system/multi-user.target.wants/$svc" ] || \
               [ -L "/mnt/root/etc/systemd/system/timers.target.wants/$svc" ]; then
              echo "  OK  $svc"
            else
              echo "  FAIL  $svc not installed or enabled"
              FAIL=1
            fi
          done

          echo "=== System config ==="
          if [ -f "/mnt/root/etc/sudoers.d/framecast" ]; then
            echo "  OK  sudoers"
          else
            echo "  FAIL  sudoers not configured"
            FAIL=1
          fi

          if [ -d "/mnt/root/home/pi/media" ]; then
            echo "  OK  media directory"
          else
            echo "  WARN  media directory not found (created at first boot if missing)"
          fi

          if [ -f "/mnt/root/opt/framecast/app/.env" ]; then
            echo "  OK  .env generated"
          else
            echo "  FAIL  .env not generated"
            FAIL=1
          fi

          echo "=== Image size ==="
          du -h "$IMG_FILE"
          df -h /mnt/root | tail -1

          sudo umount /mnt/root
          sudo losetup -d "$LOOP"

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Root filesystem validation failed"
            exit 1
          fi
          echo "Image validation passed"

  # Sign artifacts with cosign (keyless, uses GitHub OIDC)
  sign:
    name: Sign Artifacts
    needs: [build, image-validation]
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: framecast-image

      - name: Sign image with cosign (keyless)
        run: |
          for f in *.zip; do
            echo "Signing $f..."
            cosign sign-blob \
              --yes \
              --oidc-issuer https://token.actions.githubusercontent.com \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
            echo "  Signature: ${f}.sig"
            echo "  Certificate: ${f}.pem"
          done

      - name: Upload signatures
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: framecast-signatures
          path: |
            *.sig
            *.pem
          retention-days: 90

  # Generate Software Bill of Materials
  sbom:
    name: SBOM
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen
      - name: Generate Python SBOM
        run: cdxgen -t python -o sbom-python.json .
      - name: Generate Node SBOM
        run: cdxgen -t javascript -o sbom-node.json app/frontend/
      - name: Upload SBOMs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: framecast-sbom
          path: sbom-*.json
          retention-days: 90

  # SLSA Build Level 2 provenance attestation
  attest:
    name: Attest Provenance
    needs: [build, image-validation]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: framecast-image
      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: '*.zip'

  # Create GitHub Release with signed artifacts
  release:
    name: Create Release
    needs: [sign, sbom, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum ./*.zip > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/*.zip
            release-assets/*.info
            release-assets/*.sig
            release-assets/*.pem
            release-assets/*.json
            release-assets/SHA256SUMS
          generate_release_notes: true

  # Notify via Telegram
  notify:
    name: Telegram Notification
    needs: [release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ github.ref_name }}
          RELEASE_STATUS: ${{ needs.release.result }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping notification"
            exit 0
          fi

          if [ "$RELEASE_STATUS" = "success" ]; then
            printf -v MSG '✅ *FrameCast %s* released\n\n[GitHub Release](https://github.com/parthalon025/framecast/releases/tag/%s)\n\nImage built, QEMU boot tested, cosign signed.' "$TAG" "$TAG"
          else
            printf -v MSG '❌ *FrameCast %s* release failed\n\nStatus: %s\n[Check Actions](https://github.com/parthalon025/framecast/actions)' "$TAG" "$RELEASE_STATUS"
          fi

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode=Markdown \
            -d text="$MSG" \
            > /dev/null

          echo "Telegram notification sent"
