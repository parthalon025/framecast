name: Build Image

on:
  push:
    tags: ["v*"]

jobs:
  # Run full test suite before building image
  test:
    name: Test Gate
    uses: ./.github/workflows/test.yml

  build:
    name: Build Pi Image
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Pre-build frontend (host-native)
        working-directory: app/frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend output
        run: |
          test -f app/static/js/app.js || { echo "::error::Frontend build failed"; exit 1; }

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted qemu-user-static \
            debootstrap zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc gpg pigz xxd arch-test \
            binfmt-support qemu-utils kpartx fdisk

      - name: Build pi-gen image
        run: cd pi-gen && sudo bash build.sh
        env:
          GITHUB_OWNER: parthalon025
          GITHUB_REPO: framecast

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: framecast-image
          path: pi-gen/pi-gen/deploy/*.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload build info
        uses: actions/upload-artifact@v7
        with:
          name: framecast-build-info
          path: pi-gen/pi-gen/deploy/*.info
          retention-days: 30
